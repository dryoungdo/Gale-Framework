# projects.yaml — DEVBOY fleet project registry (adapted from Gale-Framework starter).
#
# Scripts, hooks, and workflows derive routing from this file.
#
# Schema per project:
#   name:           repo basename or local project name
#   repo:           GitHub repository slug
#   owner_oracle:   Oracle/pane responsible for routing work
#   lane:           heavyweight (branch→PR→merge) | lightweight (direct push allowed)
#   guard:          hook-blocked | permissive
#   family:         product | infra | oracle
#   description:    Human-readable purpose
#   status:         active | archived | decommissioned

- name: devboy-oracle
  repo: github.com/dryoungdo/devboy-oracle
  owner_oracle: devboy
  lane: heavyweight
  guard: hook-blocked
  family: oracle
  description: R&D incubator — class ingest, lab experiments, DEVBOY Lab articles, bud signals.
  status: active

- name: youngdo-mcp
  repo: github.com/dryoungdo-wellness-clinic/youngdo-mcp
  owner_oracle: youngdo-mcp
  lane: heavyweight
  guard: hook-blocked
  family: infra
  description: Clinic MCP data-transport layer (Supabase SSOT + Sheets + GENCODE). PHI-sensitive.
  status: active
