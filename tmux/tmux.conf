# Gale-Framework tmux config — symlinked to ~/.tmux.conf (migration-proof).
# Edit here, commit, push. New machines get it via scripts/setup.sh.
#
# Goal: clear clickable "tabs" (window list) + mouse support.
# Your Nameows start at 1 (base-index 1). VERIFIED safe with maw 2026-05-30:
# maw runs `new-session`/`new-window` with NO pinned index and addresses
# windows by NAME, so it honors base-index — a `maw new` session landed
# at window 1. Existing sessions created before this keep their old index
# until the tmux server restarts (or the window is renumbered).

# ── Mouse ────────────────────────────────────────────────────────────
# Click a window name in the status bar to switch tabs; scroll to read
# scrollback; drag pane borders to resize; click a pane to focus it.
set -g mouse on

# ── Status bar (the tab bar) ─────────────────────────────────────────
set -g status on
set -g status-position bottom
set -g status-interval 5
set -g status-justify left
set -g status-style 'bg=colour234,fg=colour245'

# Left: session name
set -g status-left ' #[fg=colour231,bold]#S #[default]'
set -g status-left-length 30

# Right: date + clock
set -g status-right ' #[fg=colour245]%a %d %b #[fg=colour250,bold]%H:%M '
set -g status-right-length 40

# ── Your Nameows rendered as clickable tabs ───────────────────────────────
set -g base-index 1
setw -g window-status-separator ''
setw -g window-status-format '#[fg=colour250,bg=colour236] #I:#W '
setw -g window-status-current-format '#[fg=colour16,bg=colour40,bold] #I:#W '
setw -g window-status-activity-style 'fg=colour226,bg=colour237'

# ── Safe quality-of-life ─────────────────────────────────────────────
set -g history-limit 50000
set -g focus-events on
set -sg escape-time 10
