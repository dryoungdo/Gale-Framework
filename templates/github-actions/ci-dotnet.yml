# CI Template: .NET backend + React frontend
# Copy to: .github/workflows/ci.yml
# Stacks: ProductionDashboard, FG-Label

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend  # adjust: dashboard-web, apps/web-ui
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json  # adjust path

      - run: npm ci
      - run: npm run lint --if-present
      - run: npm run build

  backend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend  # adjust: DashboardAPI, apps/api-gateway
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - run: dotnet restore
      - run: dotnet build --no-restore
      - run: dotnet test --no-build --verbosity normal --if-present

  docker-build:
    runs-on: ubuntu-latest
    needs: [frontend-lint, backend-build]
    steps:
      - uses: actions/checkout@v4
      - run: docker compose build
